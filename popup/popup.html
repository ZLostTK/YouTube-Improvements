<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>YouTube Improvements</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12a10 10 0 1 1-3-7"/><path d="M10 9l5 3-5 3z"/></svg>
      </div>
      <div>
        <h1>YouTube Improvements</h1>
        <p class="subtitle">Diseño &amp; mejora de video</p>
      </div>
    </div>
  </header>

  <main id="app-main">
    <div id="status-banner" class="status-banner" hidden></div>

    <section class="settings-list" id="settings-list" aria-live="polite">
      <!-- Se llenan dinámicamente vía popup.js -->
    </section>

    <p class="hint">Los cambios se aplican recargando la pestaña de YouTube activa.</p>
  </main>

  <footer class="app-footer">
    <button id="reload-btn" class="reload-btn" type="button">Aplicar y recargar YouTube</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
